name: Tests

on:
    push:
        branches:
            - main

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
            - uses: denoland/setup-deno@v2
              with:
                  deno-version: lts

            - run: |
                  deno install
                  deno check
                  deno test --allow-net --fail-fast --reporter=dot
